<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Rising Waters – Flood Prediction System{% endblock %}</title>
<style>
  :root {
    --deep: #0b3d5c;
    --mid: #1b6ca8;
    --accent: #2fa3d6;
    --warn: #d9534f;
    --safe: #2e8b57;
    --bg: #f4f8fb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: #1c2b36;
  }
  header {
    background: linear-gradient(135deg, var(--deep), var(--mid));
    color: #fff;
    padding: 28px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 1.6rem; }
  header h1 span { font-weight: 300; opacity: .85; }
  nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 24px;
    font-size: .95rem;
    opacity: .9;
  }
  nav a:hover { opacity: 1; text-decoration: underline; }
  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 32px 5% 60px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 28px 32px;
    box-shadow: 0 4px 18px rgba(11,61,92,0.08);
    margin-bottom: 28px;
  }
  footer {
    text-align: center;
    padding: 18px;
    color: #6b7c87;
    font-size: .85rem;
  }
</style>
{% block head %}{% endblock %}
</head>
<body>
<header>
  <h1>🌊 Rising Waters <span>| ML Flood Early-Warning System</span></h1>
  <nav>
    <a href="/">Predict</a>
    <a href="/about">Model Performance</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>Rising Waters &middot; Flask + scikit-learn/XGBoost prototype &middot; for disaster-management decision support</footer>
</body>
</html>
